name: Evanđelje Audio — Dnevni mail

on:
  schedule:
    # Svaki dan u 02:00 po hrvatskom vremenu (UTC+1 zimi, UTC+2 ljeti)
    # GitHub Actions koristi UTC — dakle 01:00 UTC (zima) / 00:00 UTC (ljeto)
    # Koristimo 01:00 UTC kao kompromis (zimi = 02:00 HR, ljeti = 03:00 HR)
    - cron: "0 1 * * *"
  workflow_dispatch:  # Omogućuje ručno pokretanje iz GitHub UI

jobs:
  send-evandjelje:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repozitorija
        uses: actions/checkout@v4

      - name: Postavi Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instaliraj ffmpeg (potreban za pydub)
        run: sudo apt-get install -y ffmpeg

      - name: Instaliraj Python pakete
        run: pip install -r requirements.txt

      - name: Pokreni skriptu
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py
